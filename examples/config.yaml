# openclaw-agentd configuration
# Generated by: openclaw-agentd init
# Full path: ~/.config/openclaw-agentd/config.yaml

# Local OpenClaw agent URL (never exposed directly)
local_agent_url: "http://127.0.0.1:18789"

# Bind address for the local proxy (127.0.0.1 = localhost only, NEVER change to 0.0.0.0)
bind_address: "127.0.0.1"

# Public hostname assigned by Cloudflare Tunnel (set automatically by `expose`)
public_hostname: ""

# Cloudflare tunnel name (set automatically by `expose`)
cloudflare_tunnel_name: ""

# AgentBoard registration API
registration_api_url: "https://agentboard.burmaster.com"

# Your agent's display name
agent_name: "My Agent"

# Unique agent ID (set automatically by `init`)
agent_id: ""

# What your agent can do (used for AgentDNS discovery)
capabilities:
  - research
  - writing

# List of trusted peer agent IDs that may call this agent directly.
# Empty = no peer-to-peer calls allowed (safest default).
allowed_peer_ids: []

# Auth mode: signed-token | mtls
auth_mode: "signed-token"

# Rate limiting
rate_limits:
  requests_per_minute: 60

# Log verbosity: debug | info | warn | error
log_level: "info"

# Whether to include approximate geolocation in registration metadata
# (coarse region only, e.g. "us-east"). Default: false (opt-in)
consent_geolocation: false

# How often to send heartbeats to the registry
heartbeat_interval: "5m"

# Ed25519 public key (base64, set automatically by `init`, stored in Keychain)
public_key: ""
